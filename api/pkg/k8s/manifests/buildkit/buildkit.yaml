apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkit-config
  namespace: default
data:
  buildkitd.toml: |
    # BuildKit daemon configuration for Kubernetes
    # See: https://docs.docker.com/build/buildkit/toml-configuration/

    # Worker configuration - OCI (runc) executor
    [worker.oci]
      enabled = true
      platforms = [ "linux/amd64", "linux/arm64" ]
      snapshotter = "auto"

      # Garbage collection settings
      gc = true
      gckeepstorage = "30%"

      [[worker.oci.gcpolicy]]
        keepBytes = 5368709120  # 5GB
        keepDuration = 172800   # 48 hours
        filters = [ "type==source.local", "type==exec.cachemount", "type==source.git.checkout" ]

      [[worker.oci.gcpolicy]]
        all = true
        keepBytes = 10737418240  # 10GB

    # Disable containerd worker (not available in our setup)
    [worker.containerd]
      enabled = false

    # Local registry configuration (HTTP, no authentication)
    [registry."registry.default.svc.cluster.local:5000"]
      http = true
      insecure = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
    spec:
      # Use host network to allow BuildKit's OCI worker to resolve cluster DNS
      # BuildKit's build containers need to access in-cluster services like the registry
      hostNetwork: true
      # Enable cluster DNS resolution while using host networking
      # This allows the pod to resolve service names like registry.default.svc.cluster.local
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: buildkitd
        image: moby/buildkit:v0.17.3
        args:
        - --addr
        - unix:///run/buildkit/buildkitd.sock
        - --addr
        - tcp://0.0.0.0:1234
        - --config
        - /etc/buildkit/buildkitd.toml
        securityContext:
          privileged: true
        volumeMounts:
        - name: buildkit-socket
          mountPath: /run/buildkit
        - name: buildkit-config
          mountPath: /etc/buildkit/buildkitd.toml
          subPath: buildkitd.toml
          readOnly: true
        ports:
        - containerPort: 1234
      volumes:
      - name: buildkit-socket
        emptyDir: {}
      - name: buildkit-config
        configMap:
          name: buildkit-config
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 1234
    targetPort: 1234
  selector:
    app: buildkitd
