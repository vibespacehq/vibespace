; vibespace supervisor configuration
; Manages: sshd (primary) + ttyd (browser fallback)

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

; sshd - SSH server for CLI terminal access (primary)
; Port 22 - fast, native terminal protocol
[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/sshd.log
stderr_logfile=/var/log/supervisor/sshd-error.log

; ttyd - Web terminal server (browser fallback)
; Port 7681 - runs as non-root user
[program:ttyd]
command=/usr/bin/ttyd -W -p 7681 /bin/bash
user=user
directory=/vibespace
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/ttyd.log
stderr_logfile=/var/log/supervisor/ttyd-error.log
environment=HOME="/home/user",USER="user",PATH="/home/user/.local/bin:/home/user/.npm-global/bin:/usr/local/bin:/usr/bin:/bin"
