; vibespace supervisor configuration
; Manages: ttyd web terminal

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

; ttyd - Web terminal server
; Runs as non-root user, serves on port 7681
[program:ttyd]
command=/usr/bin/ttyd -W -t fontSize=14 -t fontFamily="JetBrains Mono, monospace" /bin/bash
user=user
directory=/vibespace
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/ttyd.log
stderr_logfile=/var/log/supervisor/ttyd-error.log
environment=HOME="/home/user",USER="user",PATH="/home/user/.local/bin:/home/user/.npm-global/bin:/usr/local/bin:/usr/bin:/bin"
