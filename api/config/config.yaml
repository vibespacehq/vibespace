server:
  port: 8090
  host: localhost

k3s:
  install_path: /usr/local/bin/k3s
  config_path: /etc/rancher/k3s
  kubeconfig: ~/.kube/config

registry:
  url: localhost:5000
  insecure: true

buildkit:
  address: tcp://buildkitd.default.svc.cluster.local:1234

vibespace:
  namespace: vibespace
  default_resources:
    cpu: "2"
    memory: "4Gi"
    storage: "10Gi"

# Feature flags
features:
  # Enable custom DNS resolution with .vibe.space subdomains
  enable_dns: true

# DNS configuration
dns:
  # Base domain for vibespace subdomains (e.g., code.{project}.vibe.space)
  base_domain: vibe.space
  # DNS server port (used by bundled dnsd) - uses 53535 to avoid mDNS conflict on macOS
  server_port: 53535

credential:
  storage_path: ~/.vibespace/credential
  encryption: aes-256-gcm
