name: Dead Code Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  go-deadcode:
    name: Go Dead Code Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download Go dependencies
        run: |
          cd api
          go mod download
          go mod tidy

      - name: Install deadcode tool
        run: go install golang.org/x/tools/cmd/deadcode@latest

      - name: Run deadcode
        run: |
          cd api
          ~/go/bin/deadcode ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: |
          cd api
          ~/go/bin/staticcheck ./...

  typescript-deadcode:
    name: TypeScript Dead Code Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: Run knip (dead code detection)
        run: |
          cd app
          npx knip

      - name: Check unused dependencies
        run: |
          cd app
          npx depcheck
        continue-on-error: true

  rust-warnings:
    name: Rust Clippy Warnings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Run clippy
        run: |
          cd app/src-tauri
          cargo clippy -- -D warnings
