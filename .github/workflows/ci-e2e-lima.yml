name: E2E Lima

on:
  schedule:
    - cron: "0 4 * * *" # nightly at 4am UTC
  workflow_dispatch: # manual trigger

jobs:
  lima:
    runs-on: linux-vps
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Build binary
        run: go build -o vibespace ./cmd/vibespace

      - name: Run E2E tests
        run: go test -tags "e2e lima" -run TestLimaLifecycle -v -timeout 20m -count=1 ./test/e2e/
