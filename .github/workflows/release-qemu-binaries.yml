name: Build QEMU Binaries

on:
  workflow_dispatch:
    inputs:
      qemu_version:
        description: 'QEMU version to build (e.g., 10.2.0)'
        required: true
        default: '10.2.0'
  push:
    tags:
      - 'qemu-v*'

env:
  QEMU_VERSION: ${{ github.event.inputs.qemu_version || '10.2.0' }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            qemu_target: x86_64-softmmu
          - runner: ubuntu-24.04-arm
            arch: aarch64
            qemu_target: aarch64-softmmu

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            python3 \
            python3-venv \
            pkg-config \
            libglib2.0-dev \
            libpixman-1-dev \
            libslirp-dev \
            libfdt-dev \
            zlib1g-dev \
            flex \
            bison \
            seabios

      - name: Download QEMU source
        run: |
          wget https://download.qemu.org/qemu-${{ env.QEMU_VERSION }}.tar.xz
          tar xvJf qemu-${{ env.QEMU_VERSION }}.tar.xz

      - name: Configure QEMU (system emulator)
        working-directory: qemu-${{ env.QEMU_VERSION }}
        run: |
          ./configure \
            --target-list=${{ matrix.qemu_target }} \
            --disable-docs \
            --disable-gtk \
            --disable-sdl \
            --disable-vnc \
            --disable-spice \
            --disable-opengl \
            --disable-virglrenderer \
            --disable-vte \
            --disable-brlapi \
            --disable-curl \
            --disable-curses \
            --disable-libssh \
            --disable-libnfs \
            --disable-libusb \
            --disable-usb-redir \
            --disable-smartcard \
            --enable-slirp \
            --enable-kvm \
            --enable-tools

      - name: Build QEMU
        working-directory: qemu-${{ env.QEMU_VERSION }}
        run: make -j$(nproc)

      - name: Package binaries with libraries
        run: |
          mkdir -p package/bin package/lib package/share/qemu

          # Copy system emulator
          cp qemu-${{ env.QEMU_VERSION }}/build/qemu-system-${{ matrix.arch }} package/bin/

          # Copy qemu-img tool
          cp qemu-${{ env.QEMU_VERSION }}/build/qemu-img package/bin/

          # Copy firmware files (BIOS, VGA, etc.) - required for VM boot
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/*.bin package/share/qemu/ 2>/dev/null || true
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/*.rom package/share/qemu/ 2>/dev/null || true
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/edk2-*.fd package/share/qemu/ 2>/dev/null || true
          # Also copy keymaps directory
          cp -r qemu-${{ env.QEMU_VERSION }}/pc-bios/keymaps package/share/qemu/ 2>/dev/null || true

          # Bundle required shared libraries
          for bin in package/bin/*; do
            ldd "$bin" | grep "=> /" | awk '{print $3}' | while read lib; do
              # Skip system libs that are guaranteed to exist
              case "$lib" in
                /lib/x86_64-linux-gnu/libc.so*) continue ;;
                /lib/x86_64-linux-gnu/libm.so*) continue ;;
                /lib/x86_64-linux-gnu/libpthread.so*) continue ;;
                /lib/x86_64-linux-gnu/libdl.so*) continue ;;
                /lib/x86_64-linux-gnu/librt.so*) continue ;;
                /lib/aarch64-linux-gnu/libc.so*) continue ;;
                /lib/aarch64-linux-gnu/libm.so*) continue ;;
                /lib/aarch64-linux-gnu/libpthread.so*) continue ;;
                /lib/aarch64-linux-gnu/libdl.so*) continue ;;
                /lib/aarch64-linux-gnu/librt.so*) continue ;;
                */ld-linux*) continue ;;
              esac
              cp -L "$lib" package/lib/ 2>/dev/null || true
            done
          done

          # Create wrapper scripts that set LD_LIBRARY_PATH and firmware path
          for bin in package/bin/qemu-system-*; do
            name=$(basename "$bin")
            mv "$bin" "$bin.real"
            cat > "$bin" << 'WRAPPER'
          #!/bin/bash
          SCRIPT="${BASH_SOURCE[0]}"
          DIR="${SCRIPT%/*}"
          [[ "$DIR" == "$SCRIPT" ]] && DIR="."
          DIR="$(cd "$DIR" && pwd)"
          export LD_LIBRARY_PATH="$DIR/../lib:$LD_LIBRARY_PATH"
          exec "$DIR/BINNAME.real" -L "$DIR/../share/qemu" "$@"
          WRAPPER
            sed -i "s/BINNAME/$name/g" "$bin"
            chmod +x "$bin"
          done

          # qemu-img wrapper (no -L flag needed)
          mv package/bin/qemu-img package/bin/qemu-img.real
          cat > package/bin/qemu-img << 'WRAPPER'
          #!/bin/bash
          SCRIPT="${BASH_SOURCE[0]}"
          DIR="${SCRIPT%/*}"
          [[ "$DIR" == "$SCRIPT" ]] && DIR="."
          DIR="$(cd "$DIR" && pwd)"
          export LD_LIBRARY_PATH="$DIR/../lib:$LD_LIBRARY_PATH"
          exec "$DIR/qemu-img.real" "$@"
          WRAPPER
          chmod +x package/bin/qemu-img

          # Create tarball
          cd package
          tar czf ../qemu-${{ env.QEMU_VERSION }}-linux-${{ matrix.arch }}.tar.gz bin lib share
          cd ..

          # Show what we built
          echo "=== Binaries ==="
          ls -la package/bin/
          echo "=== Libraries ==="
          ls -la package/lib/
          echo "=== Firmware ==="
          ls -la package/share/qemu/ | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-${{ env.QEMU_VERSION }}-linux-${{ matrix.arch }}
          path: qemu-${{ env.QEMU_VERSION }}-linux-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: qemu-v${{ env.QEMU_VERSION }}
          name: QEMU ${{ env.QEMU_VERSION }} Binaries
          body: |
            Pre-built QEMU binaries for vibespace Linux support.

            These are minimal builds with KVM and slirp networking support.

            ## Included binaries
            - `qemu-system-x86_64` (x86_64 build)
            - `qemu-system-aarch64` (aarch64 build)
            - `qemu-img`

            ## Usage
            These binaries are automatically downloaded by `vibespace init` on Linux.
          files: |
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
