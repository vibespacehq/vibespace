name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  baremetal:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary with coverage
        run: go build -cover -o vibespace ./cmd/vibespace

      - name: Run E2E tests
        run: go test -tags e2e -v -timeout 10m -count=1 ./test/e2e/
        env:
          VIBESPACE_DEBUG: "1"
          GOCOVERDIR: ${{ github.workspace }}/coverdir

      - name: Convert coverage
        if: always()
        run: go tool covdata textfmt -i=${{ github.workspace }}/coverdir -o=coverage-e2e-baremetal.out

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage-e2e-baremetal.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload debug log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: debug-log-baremetal
          path: ~/.vibespace/debug.log
          if-no-files-found: ignore

  colima:
    if: github.actor != 'dependabot[bot]'
    runs-on: macos-m2
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Build binary with coverage
        run: go build -cover -o vibespace ./cmd/vibespace

      - name: Run E2E tests
        run: go test -tags e2e -v -timeout 15m -count=1 ./test/e2e/
        env:
          VIBESPACE_DEBUG: "1"
          GOCOVERDIR: ${{ github.workspace }}/coverdir

      - name: Convert coverage
        if: always()
        run: go tool covdata textfmt -i=${{ github.workspace }}/coverdir -o=coverage-e2e-colima.out

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage-e2e-colima.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload debug log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: debug-log-colima
          path: ~/.vibespace/debug.log
          if-no-files-found: ignore

  lima:
    if: github.actor != 'dependabot[bot]'
    runs-on: linux-hub
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Clean stale state
        run: |
          rm -rf ~/.vibespace ~/.lima/vibespace
          limactl delete vibespace --force 2>/dev/null || true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Build binary with coverage
        run: go build -cover -o vibespace ./cmd/vibespace

      - name: Run E2E tests
        run: go test -tags "e2e lima" -run TestLimaLifecycle -v -timeout 10m -count=1 ./test/e2e/
        env:
          VIBESPACE_DEBUG: "1"
          GOCOVERDIR: ${{ github.workspace }}/coverdir

      - name: Convert coverage
        if: always()
        run: go tool covdata textfmt -i=${{ github.workspace }}/coverdir -o=coverage-e2e-lima.out

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage-e2e-lima.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload debug log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: debug-log-lima
          path: ~/.vibespace/debug.log
          if-no-files-found: ignore
