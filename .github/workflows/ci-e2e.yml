name: E2E

on:
  pull_request:
    branches: [main]

jobs:
  baremetal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        run: go build -o vibespace ./cmd/vibespace

      - name: Run E2E tests
        run: go test -tags e2e -v -timeout 10m -count=1 ./test/e2e/
