name: Build Container Images

on:
  push:
    branches:
      - main
      - chore/code-quality
    paths:
      - 'build/**'
      - '.github/workflows/release-agent-images.yml'
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      base-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: build/base
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  build-agents:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        agent: [claude-code, codex]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.agent }} image
        uses: docker/build-push-action@v6
        with:
          context: build/agents/${{ matrix.agent }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.agent }}:latest
          build-args: |
            REGISTRY=${{ env.REGISTRY }}/${{ env.REPO }}
            VERSION=latest
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to: type=gha,mode=max,scope=${{ matrix.agent }}
