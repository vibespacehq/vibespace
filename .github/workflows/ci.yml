name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      - name: Install lint tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/tools/cmd/deadcode@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: staticcheck ./...

      - name: deadcode
        run: |
          output=$(deadcode -test -tags e2e ./... 2>&1)
          if [ -n "$output" ]; then
            echo "$output"
            echo "::error::deadcode found unreachable functions"
            exit 1
          fi

      - name: govulncheck
        run: govulncheck ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

  unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      - name: Test
        run: go test ./... -race -short -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | sudo sh -
          sudo chmod 644 /etc/rancher/k3s/k3s.yaml
          mkdir -p ~/.vibespace
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.vibespace/kubeconfig
          sudo chown $(id -u):$(id -g) ~/.vibespace/kubeconfig

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
